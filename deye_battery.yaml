# Deye — Personal HA Automations
# ================================
# Oscar's usage of the deyecloud HACS integration.
# The integration owns all inverter entities including TOU, work mode, sell power.
# This file contains only personal scheduling logic.

automation:
  # Work mode schedule with SOC guards.
  # Routes directly to select.deye_inverter_work_mode (HACS integration).
  - id: deye_work_mode_schedule
    alias: "Battery — Work Mode Schedule"
    trigger:
      - platform: time
        at: "18:00:00"
        id: selling_first
      - platform: time
        at: "21:00:00"
        id: zero_export
      - platform: numeric_state
        entity_id: sensor.battery_system_soc
        below: 50
        id: soc_low
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: selling_first
              - condition: numeric_state
                entity_id: sensor.battery_system_soc
                above: 60
            sequence:
              - action: select.select_option
                target:
                  entity_id: select.deye_inverter_work_mode
                data:
                  option: "Selling First"
          - conditions:
              - condition: trigger
                id: zero_export
            sequence:
              - action: select.select_option
                target:
                  entity_id: select.deye_inverter_work_mode
                data:
                  option: "Zero Export to CT"
          - conditions:
              - condition: trigger
                id: soc_low
              - condition: state
                entity_id: select.deye_inverter_work_mode
                state: "Selling First"
            sequence:
              - action: select.select_option
                target:
                  entity_id: select.deye_inverter_work_mode
                data:
                  option: "Zero Export to CT"
